name: Build and publish release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-windows:
    name: Build Windows
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package Windows assets
        shell: pwsh
        run: |
          $bundle = 'build/windows/x64/runner/Release'
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "$bundle/plokee.exe" 'dist/Plokee-windows-x64.exe'
          Compress-Archive -Path "$bundle/*" -DestinationPath 'dist/Plokee-windows-x64-portable.zip'
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/
          if-no-files-found: error

  build-linux:
    name: Build Linux
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install Linux build dependencies
        run: >-
          sudo apt-get update && sudo apt-get install --yes
          ninja-build
          libgtk-3-dev
          libayatana-appindicator3-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package Linux assets
        run: |
          mkdir dist
          bundle=build/linux/x64/release/bundle
          cp "$bundle/plokee" dist/Plokee-linux-x64
          chmod +x dist/Plokee-linux-x64
          tar --directory="$(dirname "$bundle")" -czf dist/Plokee-linux-x64.tar.gz bundle
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: dist/
          if-no-files-found: error

  build-android:
    name: Build Android APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Prepare APK
        run: |
          mkdir dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/Plokee-android-release.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/Plokee-android-release.apk
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*-release"
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
